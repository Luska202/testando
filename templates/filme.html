{% extends "base.html" %}
{% block title %}{{ filme.titulo }}{% endblock %}
{% block content %}
<div class="detalhes">
    <img src="{{ filme.logo_url }}" alt="{{ filme.titulo }}" class="logo-filme">
    <h1>{{ filme.titulo }}</h1>
    <p class="sinopse">{{ filme.sinopse }}</p>
    <div class="acoes">
        <button class="play-btn" onclick="window.location.href='/player/filme/{{ filme.id }}'">▶ Assistir</button>
        <button class="favorito-btn" data-id="{{ filme.id }}" data-tipo="filme">❤️ Favoritar</button>
    </div>
</div>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% endblock %}
